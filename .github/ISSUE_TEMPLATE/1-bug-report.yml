name: "\U0001F41B Bug report(提交bug)"
description: Create a report to help us improve
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting an issue.

        This issue tracker is for bugs and issues found within spice-link.
        If you require more general support please start a discussion on our discussion board https://github.com/zxdong262/spice-Link/discussions

        Please fill in as much of the form below as you're able.

        Before continue, make sure you are using the latest release

        仅用来追踪bug, 如果有其他的讨论请移步讨论区 https://github.com/zxdong262/spice-Link/discussions, 请务必确保问题是基于最新版本

  - type: textarea
    attributes:
      label: What steps will reproduce the bug?(重现问题的详细步骤)
      description: Enter details about your bug, preferably a simple code snippet that can be run using `node` directly without installing third-party dependencies.
    validations:
      required: true
  - type: textarea
    attributes:
      label: What should have happened?(期望的结果)
      description: If possible please provide screenshots.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Would this happen in other terminal app(是否能够在其他同类软件重现这个问题)
      description: really important.
  - type: textarea
    attributes:
      label: Additional information(其他任何相关信息)
      description: Tell us anything else you think we should know.
