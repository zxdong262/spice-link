# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: mac-x64

on:
  push:
    branches: [ build, test, build-only, mac ]

jobs:
  build:

    runs-on: macos-15-intel
    environment: build
    if: ${{ !contains(github.event.head_commit.message, '[skip build]') && !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[skip mac]') }}

    steps:
    - uses: actions/checkout@v5
    - name: Use Node.js 22.x
      uses: actions/setup-node@v5
      with:
        node-version: 22.x
    - uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    # before_install:
    - run: npm config set legacy-peer-deps true
    - run: npm install -g yarn
    - name: Download source code
      run: 'curl -H "auth: $DOWNLOAD_SRC_TOKEN" $DOWNLOAD_URL -o src-archive.tar.gz'
      env:
        DOWNLOAD_SRC_TOKEN: ${{ secrets.DOWNLOAD_SRC_TOKEN }}
        DOWNLOAD_URL: ${{ secrets.DOWNLOAD_URL }}
    - run: tar -zxvf src-archive.tar.gz
    - run: ls -al
    # - run: cp -a ./ispice-client/. ./ && ls -al
    - run: npm i

    # script:
    - run: npm run b
    - run: npm run pb
    - name: build
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        BUILD_NUMBER: ${{ secrets.BUILD_NUMBER }}
        CSC_LINK: ${{ secrets.CSC_LINK }}
        CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        APPLE_ID: ${{ secrets.APPLEID }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLEIDPASS }}
        APPLE_TEAM_ID: ${{secrets.APPLE_TEAM_ID}}
      run: node build/bin/build-mac

